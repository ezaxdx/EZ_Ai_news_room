name: AI News Pipeline

on:
  schedule:
    - cron: "0 0 * * 1-5"
  workflow_dispatch:

jobs:
  run-news:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v3

      - name: Python 설치
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: 패키지 설치
        run: |
          pip install -r requirements.txt

      - name: 뉴스 수집 실행
        run: |
          python batch/news_collector.py
